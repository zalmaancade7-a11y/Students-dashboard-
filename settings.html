<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Student Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <h2>Dashboard</h2>
      <nav class="nav-menu">
        <a href="index.html" class="nav-item">Home</a>
        <a href="students.html" class="nav-item">Students</a>
        <a href="settings.html" class="nav-item active">Settings</a>
        <a href="logout.html" class="nav-item">Logout</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="dashboard-header">
        <h1>Settings</h1>
      </div>
      <div class="card-box">
        <h3 style="text-align: left; margin-bottom: 25px;">Profile Settings</h3>
        <form>
          <div class="form-group">
            <label>Username</label>
            <input type="text" placeholder="Your username">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Your email address">
          </div>
          <div class="form-group">
            <label>Theme</label>
            <select>
              <option>Dark</option>
              <option>Light</option>
            </select>
          </div>
          <button type="submit" class="btn btn-save">Save Settings</button>
        </form>
      </div>
    </main>
  </div>
</body>
</html>
